<div class="login-container">

    <h1>Advisor Risk & Compliance Portal</h1>

    <div class="card">

        <h2>Sign In</h2>

        <input
            type="text"
            placeholder="Username"
            [(ngModel)]="username">

        <input
            type="password"
            placeholder="Password"
            [(ngModel)]="password">

        <button (click)="login()">
            Login
        </button>

    </div>

</div>
